<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaAs Dev Services | Links</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    :root {
      /* SAME H1 COLORS */
      --pink: #f472b6;
      --purple: #a855f7;
      --indigo: #6366f1;

      --text: #123c7a;
      --muted: #5c7da9;
      
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 55px 18px;
      overflow-x: hidden;

      background: linear-gradient(135deg, #eef6ff 0%, #dcecff 45%, #f7fbff 100%);
    }

    /* background blobs (kept original vibe) */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.45;
      z-index: -1;
      animation: floatBlob 11s ease-in-out infinite;
    }

    .blob-one {
      width: 320px;
      height: 320px;
      background: #b9d9ff;
      top: -100px;
      left: -80px;
    }

    .blob-two {
      width: 300px;
      height: 300px;
      background: #c8e3ff;
      right: -100px;
      bottom: -90px;
      animation-delay: -4s;
    }

    .blob-three {
      width: 180px;
      height: 180px;
      background: #d9cfff;
      right: 12%;
      top: 26%;
      opacity: 0.35;
      animation-delay: -7s;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(30px,40px) scale(1.1); }
    }

    /* GLASS CARD WRAPPER */
    .link-page {
      width: 100%;
      max-width: 560px;

      padding: 28px 20px;
      border-radius: 28px;

      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255,255,255,0.4);
      backdrop-filter: blur(18px);

      box-shadow: 0 25px 60px rgba(0,0,0,0.08);

      text-align: center;
      animation: pageEntrance 0.8s ease;
    }

    @keyframes pageEntrance {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* PROFILE (YOUR ORIGINAL LOGO STYLE KEPT) */
    .profile {
      margin-bottom: 34px;
    }

    .profile-logo-wrap {
      width: 116px;
      height: 116px;
      padding: 7px;
      margin: 0 auto 18px;
      border-radius: 50%;

      background: linear-gradient(135deg, #ffffff, #dcecff);
      box-shadow: 0 18px 38px rgba(32, 102, 191, 0.2);

      position: relative;
      animation: logoFloat 4s ease-in-out infinite;
    }

    .profile-logo-wrap::before {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid rgba(36, 105, 187, 0.25);
      animation: pulseRing 2.8s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulseRing {
      0%, 100% { transform: scale(1); opacity: 0.55; }
      50% { transform: scale(1.08); opacity: 0.12; }
    }

    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
      background: white;
      padding: 8px;
    }

    /* H1 — SAME GRADIENT (GLOBAL COLOR THEME) */
    .profile h1 {
      font-size: 2.4rem;
      font-weight: 800;

      background: linear-gradient(135deg, var(--indigo), var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .profile p {
      max-width: 440px;
      margin: auto;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
    }
    .profile .highlight {
      color: var(--purple);
      font-weight: 500;
    }

    /* LINKS */
    .links {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }

    .link-card {
      min-height: 70px;
      padding: 14px 18px;

      display: grid;
      grid-template-columns: 42px 1fr 28px;
      align-items: center;

      border-radius: 18px;
      text-decoration: none;

      color: var(--text);
      font-weight: 700;
      font-size: 16px;

      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.5);
      backdrop-filter: blur(14px);

      box-shadow: 0 10px 25px rgba(44, 112, 193, 0.08);

      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg,
        transparent,
        rgba(255,255,255,0.7),
        transparent);
      transform: translateX(-120%);
      transition: 0.7s;
    }

    .link-card:hover::before {
      transform: translateX(120%);
    }

    .link-card:hover {
      transform: translateY(-5px);
      border-color: var(--purple);
      box-shadow: 0 18px 40px rgba(168, 85, 247, 0.18);
    }

    .link-icon {
      width: 34px;
      height: 34px;
      border-radius: 11px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: linear-gradient(135deg, var(--pink), var(--purple), var(--indigo));
      color: white;
      font-size: 16px;
    }

    .arrow {
      width: 26px;
      height: 26px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      background: #edf5ff;
      color: var(--indigo);
      font-size: 12px;
      transition: 0.3s;
    }

    .link-card:hover .arrow {
      background: var(--indigo);
      color: white;
      transform: translateX(4px);
    }

    footer {
      margin-top: 35px;
      font-size: 13px;
      color: var(--muted);
    }

    .heart {
      color: var(--pink);
      animation: beat 1.5s infinite;
    }

    @keyframes beat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    @media (max-width: 480px) {
      .profile h1 { font-size: 2rem; }
    }

    /* Badges */
    .badges {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
      opacity: 0.6;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .badges span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badges i {
      font-size: 12px;
      color: var(--purple);
    }
  </style>
</head>
